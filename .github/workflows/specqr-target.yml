name: SpecQR Target

on:
  workflow_dispatch:
    inputs:
      package_spec:
        description: SpecQR npm package spec, for example specqr@2.4.0, specqr@latest, or specqr@next.
        required: true
        default: specqr@2.4.0
        type: string
      node_version:
        description: Node.js version for this investigation run.
        required: true
        default: "22"
        type: string

permissions:
  contents: read

jobs:
  conformance:
    name: ${{ inputs.package_spec }} on Node ${{ inputs.node_version }}
    runs-on: ubuntu-latest
    env:
      SPECQR_TARGET_REQUESTED: ${{ inputs.package_spec }}
      SPECQR_TARGET_SOURCE: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install pinned lab dependencies
        run: npm ci

      - name: Validate vectors
        run: npm run validate:vectors

      - name: Test tooling on pinned baseline
        run: npm test

      - name: Generate baseline report
        env:
          SPECQR_TARGET_REQUESTED: specqr@2.4.0
          SPECQR_TARGET_SOURCE: npm
        run: node tools/run-conformance.js --output reports/baseline.json

      - name: Verify baseline report integrity
        run: npm run verify:report -- --report reports/baseline.json

      - name: Install requested SpecQR package
        env:
          PACKAGE_SPEC: ${{ inputs.package_spec }}
        run: npm install --no-save --package-lock=false "$PACKAGE_SPEC"

      - name: Confirm package manifests unchanged
        run: git diff --exit-code -- package.json package-lock.json

      - name: Verify installed SpecQR target
        run: npm run verify:target

      - name: Generate candidate report
        run: node tools/run-conformance.js --output reports/candidate.json

      - name: Verify candidate report integrity
        continue-on-error: true
        run: npm run verify:report -- --report reports/candidate.json

      - name: Compare reports
        run: |
          npm run compare:reports -- \
            --base reports/baseline.json \
            --candidate reports/candidate.json \
            --json-output reports/comparison.json \
            --markdown-output reports/comparison.md

      - name: Comparison summary
        if: always()
        run: |
          if [ -f reports/comparison.md ]; then
            cat reports/comparison.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "reports/comparison.md was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload target comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specqr-target-node-${{ inputs.node_version }}
          if-no-files-found: warn
          path: |
            reports/baseline.json
            reports/candidate.json
            reports/comparison.json
            reports/comparison.md
