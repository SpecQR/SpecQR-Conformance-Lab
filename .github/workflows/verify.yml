name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22
          - 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Summary
        if: always()
        run: |
          if [ -f reports/latest.json ]; then
            npm run summary
          else
            echo "reports/latest.json was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report-node-${{ matrix.node-version }}
          if-no-files-found: warn
          path: |
            reports/latest.json
            reports/latest.html
            badges/*.json
